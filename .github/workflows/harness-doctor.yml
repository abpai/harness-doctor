name: Harness Doctor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  harness-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter harness-doctor... build

      - uses: ./
        with:
          fail-on: none
          node-version: 22.18.0
          version: ./packages/harness-doctor
