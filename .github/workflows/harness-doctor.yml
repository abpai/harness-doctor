name: Harness Doctor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  harness-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2

      - run: bun ci

      - run: bun run build --filter=@andypai/harness-doctor

      - uses: ./
        with:
          fail-on: none
          bun-version: 1.3.14
          version: ./packages/harness-doctor
